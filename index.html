<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senha Profissional</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <h2>Deterministic Key</h2>
        <p>Gere uma combinação de segurança única a partir do seu endereço de e-mail.</p>
        
        <div class="input-group">
            <input type="email" id="emailInput" placeholder="Digite seu e-mail corporativo ou pessoal" required>
            <button onclick="gerarSenhaPorEmail()">Gerar Chave de Acesso</button>
        </div>

        <div class="slots-container">
            <div class="slot">-</div>
            <div class="slot">-</div>
            <div class="slot">-</div>
            <div class="slot">-</div>
            <div class="slot">-</div>
            <div class="slot">-</div>
        </div>
    </div>

    <script>
        // Funções matemáticas para transformar o e-mail em uma senha fixa (Determinística)
        function cyrb128(str) {
            let h1 = 1779033703, h2 = 3024733165, h3 = 3362453659, h4 = 502493848;
            for (let i = 0, k; i < str.length; i++) {
                k = str.charCodeAt(i);
                h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
                h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
                h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
                h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
            }
            h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
            h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
            h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
            h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
            return [(h1^h2^h3^h4)>>>0, (h2^h1)>>>0, (h3^h1)>>>0, (h4^h1)>>>0];
        }

        function sfc32(a, b, c, d) {
            return function() {
                a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0;
                var t = (a + b) | 0;
                a = b ^ (b >>> 9);
                b = (c + (c << 3)) | 0;
                c = (c << 21) | (c >>> 11);
                d = (d + 1) | 0;
                t = (t + d) | 0;
                c = (c + t) | 0;
                return (t >>> 0) / 4294967296;
            }
        }

        function gerarSenhaPorEmail() {
            const email = document.getElementById('emailInput').value.trim().toLowerCase();
            
            if (!email) {
                alert("Por favor, digite um e-mail válido.");
                return;
            }

            const seed = cyrb128(email);
            const rand = sfc32(seed[0], seed[1], seed[2], seed[3]);

            const letrasMaiusculas = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const numeros = "0123456789";
            const todosCaracteres = letrasMaiusculas + numeros;

            let senha = [];

            // 2 Letras Maiúsculas obrigatórias
            for (let i = 0; i < 2; i++) {
                senha.push(letrasMaiusculas[Math.floor(rand() * letrasMaiusculas.length)]);
            }
            // 3 Números obrigatórios
            for (let i = 0; i < 3; i++) {
                senha.push(numeros[Math.floor(rand() * numeros.length)]);
            }
            // Última vaga aleatória
            senha.push(todosCaracteres[Math.floor(rand() * todosCaracteres.length)]);

            // Embaralha as posições de forma constante com base no e-mail
            for (let i = senha.length - 1; i > 0; i--) {
                const j = Math.floor(rand() * (i + 1));
                [senha[i], senha[j]] = [senha[j], senha[i]];
            }

            // Exibe nos quadrados e adiciona o efeito visual profissional
            const slots = document.querySelectorAll('.slot');
            slots.forEach((slot, index) => {
                slot.textContent = senha[index];
                slot.classList.remove('active');
                void slot.offsetWidth; // Força reinicialização da animação
                slot.classList.add('active');
            });
        }
    </script>
</body>
</html>
